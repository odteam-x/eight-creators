<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#080A0F">
  <title>EIGHT CREATORS LABs — Portal</title>
  <link rel="icon" type="image/x-icon" href="icono.ico">
  <link rel="apple-touch-icon" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="user.css">
  <link rel="stylesheet" href="secretario.css">
</head>
<body>

<div id="top"></div>
<div class="bg-canvas" aria-hidden="true">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
</div>
<div class="bg-grid" aria-hidden="true"></div>
<a href="#top" class="back-top" id="back-top" aria-label="Volver arriba"></a>

<!-- TOPBAR -->
<header class="topbar" id="topbar">
  <div class="tb-brand">
    <img src="logo.png" alt="" class="tb-logo" onerror="this.style.display='none'">
    <span class="tb-title">EIGHT<em> CREATORS</em></span>
    <span class="portal-badge" id="role-badge">PORTAL</span>
  </div>
  <nav class="tb-nav" id="desktop-nav">
    <button class="tnav active" onclick="switchTab('miscore',this)">Mi Score</button>
    <button class="tnav sec-only" onclick="switchTab('ranking',this)" style="display:none">Ranking</button>
    <button class="tnav" onclick="switchTab('distrito',this)">Mi Distrito</button>
    <button class="tnav" onclick="switchTab('rubrica',this)">Rúbrica</button>
    <button class="tnav" onclick="switchTab('cal',this)">Calendario</button>
  </nav>
  <div class="tb-user">
    <button class="btn-refresh" id="btn-refresh" onclick="handleRefresh()">
      <svg class="refresh-icon" viewBox="0 0 16 16" fill="none"><path d="M13.65 2.35A8 8 0 1 0 15 8h-1.5A6.5 6.5 0 1 1 8 1.5a6.44 6.44 0 0 1 4.59 1.91L10.5 5.5H15V1l-1.35 1.35z" fill="currentColor"/></svg>
      Actualizar
    </button>
    <span class="last-updated-badge" id="ts-badge"></span>
    <div class="avatar" style="background:linear-gradient(135deg,#5B7FFF,#2D3478)" id="av-desktop">?</div>
    <span class="uname" id="uname-desktop">—</span>
    <button class="btn-out" onclick="logout()">Salir</button>
  </div>
  <button class="hamburger" id="hamburger" aria-label="Menú" aria-expanded="false" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </button>
</header>

<!-- MOBILE MENU -->
<div class="mobile-menu" id="mobile-menu">
  <div class="mobile-nav-links">
    <button class="mobile-nav-btn active"            onclick="switchTabMobile('miscore',this)">📊 &nbsp;Mi Score</button>
    <button class="mobile-nav-btn sec-only"          onclick="switchTabMobile('ranking',this)" style="display:none">🏆 &nbsp;Ranking</button>
    <button class="mobile-nav-btn"                   onclick="switchTabMobile('distrito',this)">🗺️ &nbsp;Mi Distrito</button>
    <button class="mobile-nav-btn"                   onclick="switchTabMobile('rubrica',this)">📋 &nbsp;Rúbrica</button>
    <button class="mobile-nav-btn"                   onclick="switchTabMobile('cal',this)">📅 &nbsp;Calendario</button>
    <button class="mobile-nav-btn mobile-nav-btn--refresh" onclick="handleRefresh();closeMenu()">
      <svg class="refresh-icon" viewBox="0 0 16 16" fill="none"><path d="M13.65 2.35A8 8 0 1 0 15 8h-1.5A6.5 6.5 0 1 1 8 1.5a6.44 6.44 0 0 1 4.59 1.91L10.5 5.5H15V1l-1.35 1.35z" fill="currentColor"/></svg>
      &nbsp;Actualizar datos
    </button>
  </div>
  <div class="mobile-user-section">
    <div class="avatar" style="background:linear-gradient(135deg,#5B7FFF,#2D3478)" id="av-mobile">?</div>
    <div class="mobile-uinfo">
      <div class="mobile-uname" id="uname-mobile">—</div>
      <div class="mobile-urole" id="role-label-mob">Portal</div>
      <div class="last-updated-badge" id="ts-badge-mob"></div>
    </div>
    <button class="btn-out-mobile" onclick="logout()">Salir</button>
  </div>
</div>

<!-- ══ TAB: MI SCORE ══ -->
<div id="tab-miscore" class="tab-content active">
  <div class="m-hero" style="background:linear-gradient(to bottom,rgba(45,52,120,.18),transparent)">
    <div class="m-hero-inner">
      <div class="hero-left">
        <div class="m-tag" id="hero-tag" style="color:var(--blue)">CELIDER</div>
        <div class="m-name-big" id="hero-name">—</div>
        <div class="m-pe-label">Período activo: <span id="hero-pe">PE1</span></div>
      </div>
      <div class="hero-right">
        <div class="score-big" id="hero-score">—</div>
        <div class="score-lbl">/ <span id="hero-max">30</span> PTS · <span id="hero-nivel">—</span></div>
      </div>
    </div>
  </div>
  <div class="m-content">
    <div class="pe-row">
      <button class="pb active" onclick="selectPE('PE1',this)">PE1</button>
      <button class="pb"        onclick="selectPE('PE2',this)">PE2</button>
      <button class="pb"        onclick="selectPE('PE3',this)">PE3</button>
    </div>
    <div id="score-body"><div class="loading-box"><span class="spin"></span></div></div>
  </div>
</div>

<!-- ══ TAB: RANKING (solo secretario) ══ -->
<div id="tab-ranking" class="tab-content">
  <div class="m-content tab-top-pad">
    <h2 class="tab-title tab-title--mb">RANKING DE DISTRITOS</h2>
    <div class="pe-row">
      <button class="pb active" onclick="selectPERankDist('PE1',this)">PE1</button>
      <button class="pb"        onclick="selectPERankDist('PE2',this)">PE2</button>
      <button class="pb"        onclick="selectPERankDist('PE3',this)">PE3</button>
    </div>
    <div id="ranking-dist-body"><div class="loading-box"><span class="spin"></span></div></div>
  </div>
</div>

<!-- ══ TAB: MI DISTRITO ══ -->
<div id="tab-distrito" class="tab-content">
  <div class="m-content tab-top-pad">

    <div class="distrito-header" id="distrito-header">
      <div class="loading-box"><span class="spin"></span></div>
    </div>

    <div class="pe-row" style="margin-top:20px">
      <button class="pb active" onclick="selectPERank('PE1',this)">PE1</button>
      <button class="pb"        onclick="selectPERank('PE2',this)">PE2</button>
      <button class="pb"        onclick="selectPERank('PE3',this)">PE3</button>
    </div>

    <!-- Calificación del distrito (solo secretario) -->
    <div id="dist-calificacion" style="display:none">
      <div class="section-label" style="margin-bottom:10px">Calificación del Distrito</div>
      <div id="dist-cal-body"></div>
    </div>

    <div class="dist-stat-cards" id="dist-stats"></div>
    <div class="section-label">Miembros del distrito</div>
    <div id="distrito-members"><div class="loading-box"><span class="spin"></span></div></div>
  </div>
</div>



<!-- ══ TAB: RÚBRICA ══ -->
<div id="tab-rubrica" class="tab-content">
  <div class="m-content tab-top-pad">
    <h2 class="tab-title tab-title--mb">TABLA DE PUNTUACIÓN</h2>
    <div class="rubrica-wrap">
      <p class="rubrica-intro">Cada criterio se evalúa del <strong>1 al 4</strong>. Puntaje máximo con bono: <strong>30 puntos</strong>.</p>
      <div class="rubrica-grid" id="rubrica-grid"></div>
    </div>
  </div>
</div>

<!-- ══ TAB: CALENDARIO ══ -->
<div id="tab-cal" class="tab-content">
  <div class="m-content tab-top-pad">
    <h2 class="tab-title tab-title--mb">CALENDARIO DE EVALUACIONES</h2>
    <div class="cal-grid" id="cal-grid">
      <div class="loading-box" style="grid-column:1/-1"><span class="spin"></span></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="config.js"></script>
<script src="api.js"></script>
<script src="auth.js"></script>
<script src="secretario.js"></script>
</body>
</html>
